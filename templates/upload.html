{% extends 'base.html' %}
{% block title %}Upload | NexStream{% endblock %}
{% block content %}
<section class="panel">
    <h2>Upload Pipeline</h2>
    <form id="uploadForm" class="upload-form">
        <label>Title<input name="title" required></label>
        <label>Description<textarea name="description" rows="3"></textarea></label>
        <label>Category<input name="category" value="Tech"></label>
        <label>Tags (comma separated)<input name="tags" placeholder="ai,streaming,hls"></label>
        <button type="submit">Start Processing</button>
    </form>
    <div id="uploadProgress" class="progress-box">No active jobs.</div>
</section>
{% endblock %}
