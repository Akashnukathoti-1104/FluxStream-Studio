<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}NexStream{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <span class="logo">NX</span>
            <div>
                <h1>NexStream</h1>
                <p>studio 2.0</p>
            </div>
        </div>
        <nav>
            <a href="{{ url_for('videos.root_dashboard') }}">Dashboard</a>
            <a href="{{ url_for('videos.videos_page') }}">Videos</a>
            <a href="{{ url_for('videos.upload_page') }}">Upload</a>
            <a href="{{ url_for('studio.studio_page') }}">Studio</a>
            <a href="{{ url_for('videos.live_page') }}">Live</a>
        </nav>
    </aside>

    <main class="main">
        <header class="topbar">
            <div>
                <strong>NexStream Control</strong>
                <p>AI-powered streaming workflow</p>
            </div>
            <span class="badge">v2.0</span>
        </header>
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/player.js') }}"></script>
    <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
</body>
</html>
