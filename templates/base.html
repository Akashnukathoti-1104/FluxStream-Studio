<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FluxStream Studio{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js" defer></script>
    <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <a class="brand" href="{{ url_for('main.dashboard') }}">
                <span class="brand-mark">FS</span>
                <span>
                    <strong>FluxStream Studio</strong>
                    <small>Upload, transcode, stream, own the library</small>
                </span>
            </a>
            <nav class="topnav">
                <a href="{{ url_for('main.dashboard') }}">Library</a>
                <a href="{{ url_for('main.upload') }}" class="primary-link">New Upload</a>
            </nav>
        </header>

        <main class="content-wrap">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <section class="flash-stack" aria-live="polite">
                        {% for category, message in messages %}
                            <div class="flash flash-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    </section>
                {% endif %}
            {% endwith %}

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
