services:
  - type: web
    name: nexstream
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT
    autoDeploy: true
    disk:
      name: fluxstream-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
